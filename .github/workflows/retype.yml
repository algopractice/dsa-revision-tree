name: Publish Retype Docs
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0 # Required for tracking file history metadata

      - name: Build website
        uses: retypeapp/action-build@latest

      - name: Publish to Branch
        uses: retypeapp/action-github-pages@latest
        with:
          update-branch: true
