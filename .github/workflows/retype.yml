name: Publish Retype Docs
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2 # Stable Node 24 target execution layer
        with:
          fetch-depth: 0

      - name: Build website
        uses: retypeapp/action-build@v4.7.0 # Pinned to stable engine version

      - name: Publish to Branch
        uses: retypeapp/action-github-pages@v4.7.0 # Pinned to stable engine version
        with:
          update-branch: true
