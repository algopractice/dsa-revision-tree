name: Automated Release with Assets

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a version tag (e.g., v1.0.2)

jobs:
  create-release-with-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the runner to create releases and upload files

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Simulate compilation (Creating an automated artifact file)
      - name: Generate Dummy Artifact
        run: |
          echo "This file was created automatically by GitHub Actions at $(date)" > build-log.txt
          echo "This simulates a compiled APK, DMG, or JAR file!" >> build-log.txt

      # 2. Automatically create the release and upload the file
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          # Tell GitHub Actions exactly which generated file(s) to attach
          files: build-log.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}